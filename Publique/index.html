<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="mWBUMT8IeF7O9Eq-44YOL1zkBKC5VImMngW34zQVnSE" />
    <title>APPNET · Store d'applications Android</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
                            500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
                            950: '#172554' },
                        dark: '#0a0e1a',
                        'dark-card': '#111827',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animated {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.06), transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(29, 78, 216, 0.04), transparent 60%),
                #0a0e1a;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-animated .float-icon {
            position: absolute;
            font-size: 3rem;
            opacity: 0.04;
            color: #3b82f6;
            animation: floatAround 25s infinite alternate ease-in-out;
        }
        .bg-animated .float-icon:nth-child(1) { top: 5%; left: 3%; font-size: 4rem; animation-duration: 22s; color: #60a5fa; }
        .bg-animated .float-icon:nth-child(2) { top: 80%; left: 90%; font-size: 5rem; animation-duration: 18s; animation-delay: 1s; color: #93c5fd; }
        .bg-animated .float-icon:nth-child(3) { top: 15%; left: 80%; font-size: 3.5rem; animation-duration: 25s; animation-delay: 0.5s; color: #2563eb; }
        .bg-animated .float-icon:nth-child(4) { top: 85%; left: 5%; font-size: 4.2rem; animation-duration: 20s; animation-delay: 2s; color: #1d4ed8; }
        .bg-animated .float-icon:nth-child(5) { top: 40%; left: 50%; font-size: 6rem; animation-duration: 28s; animation-delay: 0.8s; opacity: 0.03; color: #3b82f6; }
        .bg-animated .float-icon:nth-child(6) { top: 2%; left: 40%; font-size: 3rem; animation-duration: 24s; animation-delay: 1.5s; color: #8b5cf6; }
        .bg-animated .float-icon:nth-child(7) { top: 92%; left: 30%; font-size: 4.5rem; animation-duration: 19s; animation-delay: 0.3s; color: #f472b6; }
        .bg-animated .float-icon:nth-child(8) { top: 20%; left: 15%; font-size: 3.8rem; animation-duration: 21s; animation-delay: 2.5s; color: #fbbf24; }
        .bg-animated .float-icon:nth-child(9) { top: 60%; left: 70%; font-size: 4.8rem; animation-duration: 23s; animation-delay: 0.1s; color: #34d399; }
        .bg-animated .float-icon:nth-child(10) { top: 50%; left: 5%; font-size: 5rem; animation-duration: 27s; animation-delay: 1.8s; opacity: 0.03; color: #f87171; }

        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(80px, -60px) rotate(12deg) scale(1.1); }
            50% { transform: translate(-50px, 80px) rotate(-8deg) scale(0.9); }
            75% { transform: translate(100px, 40px) rotate(15deg) scale(1.05); }
            100% { transform: translate(-60px, -40px) rotate(-10deg) scale(0.95); }
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10, 14, 26, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.7rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .logo .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: 0 6px 18px rgba(59, 130, 246, 0.25);
        }
        .header .logo h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .header .search {
            flex: 1;
            max-width: 480px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 0.3rem 0.8rem;
            transition: all 0.3s;
        }
        .header .search:focus-within {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
        }
        .header .search input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 0.9rem;
            padding: 0.3rem 0.5rem;
        }
        .header .search input::placeholder {
            color: #6b7280;
        }
        .header .search i {
            color: #6b7280;
            padding: 0 0.3rem;
            font-size: 0.9rem;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 1.8rem 2rem 3rem;
        }

        .apps-section {
            margin-bottom: 2rem;
        }
        .apps-section .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
            padding-left: 0.2rem;
        }
        .apps-section .section-title .badge {
            font-size: 0.75rem;
            font-weight: 500;
            color: #9ca3af;
            margin-left: 0.5rem;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.2rem;
        }

        .app-card {
            background: rgba(17, 24, 39, 0.55);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 0.9rem 0.9rem 0.8rem;
            transition: all 0.25s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            cursor: pointer;
            min-height: 190px;
        }
        .app-card:hover {
            transform: translateY(-4px);
            border-color: rgba(59, 130, 246, 0.25);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.06);
            background: rgba(17, 24, 39, 0.7);
        }

        .app-card .logo {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            overflow: hidden;
            background: #1a1f36;
            border: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
            margin-bottom: 0.6rem;
            align-self: flex-start;
        }
        .app-card .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app-card .logo .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #6b7280;
        }

        .app-card .app-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-align: left;
            width: 100%;
        }

        .app-card .app-category {
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 0.2rem;
            text-align: left;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-card .app-downloads {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.3rem;
            display: flex;
            align-items: center;
            gap: 4px;
            text-align: left;
            width: 100%;
        }
        .app-card .app-downloads i {
            font-size: 0.65rem;
            color: #6b7280;
        }

        .loading-state, .error-state, .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #9ca3af;
        }
        .loading-state i, .error-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        .loading-state i { color: #60a5fa; }
        .error-state i { color: #f87171; }
        .loading-state .spinner { animation: spin 1s linear infinite; }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header { padding: 0.6rem 1rem; }
            .header .search { max-width: 100%; order: 3; flex-basis: 100%; margin-top: 0.4rem; }
            .container { padding: 1rem; }
            .apps-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
            .app-card { padding: 0.7rem; min-height: 160px; }
            .app-card .logo { width: 56px; height: 56px; }
            .app-card .app-name { font-size: 0.85rem; }
        }

        @media (max-width: 480px) {
            .apps-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .app-card .logo { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>

    <div class="bg-animated">
        <i class="fas fa-store float-icon"></i>
        <i class="fas fa-cloud float-icon"></i>
        <i class="fas fa-gamepad float-icon"></i>
        <i class="fas fa-music float-icon"></i>
        <i class="fas fa-film float-icon"></i>
        <i class="fas fa-robot float-icon"></i>
        <i class="fas fa-shopping-bag float-icon"></i>
        <i class="fas fa-headphones float-icon"></i>
        <i class="fas fa-camera float-icon"></i>
        <i class="fas fa-video float-icon"></i>
        <i class="fas fa-code float-icon" style="top:12%;left:70%;font-size:4.5rem;opacity:0.03;color:#8b5cf6;animation-duration:20s;"></i>
        <i class="fas fa-database float-icon" style="top:65%;left:25%;font-size:5rem;opacity:0.025;color:#f59e0b;animation-duration:26s;"></i>
        <i class="fas fa-shield-alt float-icon" style="top:45%;left:88%;font-size:3.8rem;opacity:0.035;color:#34d399;animation-duration:22s;"></i>
        <i class="fas fa-chart-line float-icon" style="top:78%;left:55%;font-size:4.2rem;opacity:0.025;color:#f472b6;animation-duration:24s;"></i>
    </div>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="logo">
            <div class="icon">A</div>
            <h1>APPNET</h1>
        </div>
        <div class="search">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Rechercher des applications..." />
        </div>
    </header>

    <!-- ===== CONTENU ===== -->
    <div class="container" id="appContainer">
        <div id="appsContent">
            <div class="loading-state">
                <i class="fas fa-spinner spinner"></i>
                <p>Chargement des applications...</p>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const API_BASE = 'https://appnet-backend.onrender.com/api';
        const container = document.getElementById('appsContent');
        const searchInput = document.getElementById('searchInput');

        let allApps = [];

        function formatDownloads(count) {
            if (count === undefined || count === null) return '0';
            const num = Number(count);
            if (isNaN(num)) return '0';
            if (num >= 1_000_000_000) return (num / 1_000_000_000).toFixed(1).replace('.0', '') + ' Md';
            if (num >= 1_000_000) return (num / 1_000_000).toFixed(1).replace('.0', '') + ' M';
            if (num >= 1000) return (num / 1000).toFixed(1).replace('.0', '') + ' k';
            return num.toString();
        }

        async function fetchApps() {
            const response = await fetch(API_BASE + '/public/apps');
            if (!response.ok) throw new Error('Impossible de charger les applications');
            const data = await response.json();
            if (!data.success) throw new Error(data.message || 'Erreur API');
            return data.apps || [];
        }

        function renderApps(apps) {
            if (!apps || apps.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>Aucune application disponible</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="apps-section">
                    <div class="section-title">
                        Toutes les applications
                        <span class="badge">${apps.length}</span>
                    </div>
                    <div class="apps-grid">
            `;

            apps.forEach(function(app) {
                var logoHtml = app.logo_url
                    ? '<img src="' + app.logo_url + '" alt="' + (app.title || '') + '" loading="lazy" />'
                    : '<div class="placeholder"><i class="fas fa-mobile-alt"></i></div>';

                // ✅ Construction du lien : priorité au slug, fallback sur l'ID
                var link;
                if (app.slug) {
                    link = 'app-detail.html?slug=' + encodeURIComponent(app.slug);
                } else if (app.id) {
                    link = 'app-detail.html?id=' + app.id;
                } else {
                    link = '#';
                }

                html += `
                    <a href="${link}" class="app-card">
                        <div class="logo">${logoHtml}</div>
                        <div class="app-name">${app.title || app.package_name || 'Sans titre'}</div>
                        <div class="app-category">${app.category || 'Non catégorisé'}</div>
                        <div class="app-downloads"><i class="fas fa-download"></i> ${formatDownloads(app.downloads_count || 0)}</div>
                    </a>
                `;
            });

            html += `
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function filterApps(query) {
            if (!query.trim()) {
                renderApps(allApps);
                return;
            }
            var search = query.toLowerCase();
            var filtered = allApps.filter(function(app) {
                return (app.title && app.title.toLowerCase().includes(search)) ||
                    (app.package_name && app.package_name.toLowerCase().includes(search)) ||
                    (app.category && app.category.toLowerCase().includes(search));
            });
            renderApps(filtered);
        }

        async function init() {
            try {
                container.innerHTML = `
                    <div class="loading-state">
                        <i class="fas fa-spinner spinner"></i>
                        <p>Chargement des applications...</p>
                    </div>
                `;
                allApps = await fetchApps();
                renderApps(allApps);
            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" style="margin-top:1rem;padding:8px 24px;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.3);border-radius:40px;color:#60a5fa;cursor:pointer;">Réessayer</button>
                    </div>
                `;
            }
        }

        searchInput.addEventListener('input', function() {
            filterApps(this.value);
        });

        init();
    })();
    </script>
</body>
</html>
